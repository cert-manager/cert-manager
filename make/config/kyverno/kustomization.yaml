# This Kustomization adapts the Kyverno ValidatingPolicy resources downloaded
# from https://github.com/kyverno/policies/ (CEL-based, Kyverno >= 1.14) for
# use in the cert-manager namespace and in the E2E test namespaces.
#
# Migration notes:
# * The legacy ClusterPolicy (kyverno.io/v1) resources have been replaced with
#   ValidatingPolicy (policies.kyverno.io/v1) resources written in CEL.
#   See https://kyverno.io/docs/policy-types/validating-policy/ and
#   https://kyverno.io/docs/guides/migration-to-cel/.
# * `validationFailureAction: Enforce` is now `validationActions: [Deny]`.
# * Namespace exclusion that used to be done via `spec.rules[*].exclude` is
#   now done via top-level `matchConditions` using the CEL `object.metadata.namespace`
#   variable, which works uniformly for all rules.
# * `restrict-apparmor-profiles` from the legacy `pod-security/baseline` bundle
#   has no equivalent in `pod-security-vpol/baseline` yet and is omitted.
# * The pre-migration policy was `other/restrict-automount-sa-token`, which
#   validates Pods (spec.automountServiceAccountToken). Its CEL/ValidatingPolicy
#   catalog has no like-for-like replacement: the only automount-related entry
#   in `other-vpol` is `restrict-sa-automount-sa-token`, which validates
#   ServiceAccounts themselves (object.automountServiceAccountToken) - a
#   different resource and field, not an equivalent rewrite. Enforcing that as
#   published denies Kubernetes' own creation of the "default" ServiceAccount
#   for every namespace (nothing sets automountServiceAccountToken on it), so
#   it's patched below to restore the original Pod-targeting semantics instead.
#
# Use as follows:
#  kustomize build . > policy.yaml
#
resources:
  - https://github.com/kyverno/policies/pod-security-vpol/baseline
  - https://github.com/kyverno/policies/pod-security-vpol/restricted
  - https://github.com/kyverno/policies/raw/main/other-vpol/restrict-sa-automount-sa-token/restrict-sa-automount-sa-token.yaml
  - https://github.com/kyverno/policies/raw/main/best-practices-vpol/require-ro-rootfs/require-ro-rootfs.yaml
patches:
  - target:
      kind: ValidatingPolicy
    patch: |
      - op: replace
        path: /spec/validationActions
        value:
          - Deny
      - op: add
        path: /spec/matchConstraints/namespaceSelector
        value:
          matchExpressions:
            - key: kubernetes.io/metadata.name
              operator: NotIn
              values:
                - bind
                - e2e-vault
                - e2e-vault-mtls
                - gateway-system
                - ingress-nginx
                - pebble
                - kgateway-system
                - sample-external-issuer-system
                - samplewebhook
  - target:
      kind: ValidatingPolicy
      name: restrict-sa-automount-sa-token
    patch: |
      - op: replace
        path: /spec/matchConstraints/resourceRules/0/resources
        value:
          - pods
      - op: replace
        path: /spec/validations/0/expression
        value: object.spec.?automountServiceAccountToken.orValue(true) == false
      - op: replace
        path: /spec/validations/0/message
        value: Pods must set automountServiceAccountToken to false.
