# This klone.yaml file describes the Makefile modules and versions that are
# cloned into the "make/_shared" folder. These modules are dynamically imported
# by the root Makefile. The "make upgrade-klone" target can be used to pull
# the latest version from the upstream repositories (using the repo_ref value).
#
# More info can be found here: https://github.com/cert-manager/makefile-modules

targets:
  make/_shared:
    - folder_name: boilerplate
      repo_url: https://github.com/cert-manager/makefile-modules.git
      repo_ref: main
      repo_hash: 5c3266f17637fbd1d4af1191b34674991e2160ab
      repo_path: modules/boilerplate
    - folder_name: generate-verify
      repo_url: https://github.com/cert-manager/makefile-modules.git
      repo_ref: main
      repo_hash: 5c3266f17637fbd1d4af1191b34674991e2160ab
      repo_path: modules/generate-verify
    - folder_name: go
      repo_url: https://github.com/cert-manager/makefile-modules.git
      repo_ref: main
      repo_hash: 5c3266f17637fbd1d4af1191b34674991e2160ab
      repo_path: modules/go
    - folder_name: help
      repo_url: https://github.com/cert-manager/makefile-modules.git
      repo_ref: main
      repo_hash: 5c3266f17637fbd1d4af1191b34674991e2160ab
      repo_path: modules/help
    - folder_name: klone
      repo_url: https://github.com/cert-manager/makefile-modules.git
      repo_ref: main
      repo_hash: 5c3266f17637fbd1d4af1191b34674991e2160ab
      repo_path: modules/klone
    - folder_name: repository-base
      repo_url: https://github.com/cert-manager/makefile-modules.git
      repo_ref: main
      repo_hash: 5c3266f17637fbd1d4af1191b34674991e2160ab
      repo_path: modules/repository-base
    - folder_name: tools
      repo_url: https://github.com/cert-manager/makefile-modules.git
      repo_ref: main
      repo_hash: 5c3266f17637fbd1d4af1191b34674991e2160ab
      repo_path: modules/tools
  third_party/forked:
    - folder_name: acme
      repo_url: https://github.com/sigmavirus24/golang-x-crypto
      repo_ref: proposal/73101
      repo_hash: c622daa7bb7676bd5480b7f49679e5e4c2adb4fb
      repo_path: acme
