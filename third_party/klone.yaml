# Clone folders from third_party repos and forks.
# More info can be found here: https://github.com/cert-manager/klone
targets:
  forked:
    # Vendor the acme package from @sigmavirus24's fork of golang.org/x/crypto,
    # which as support for ACME profiles.
    # See https://github.com/golang/go/issues/73101#issuecomment-2764923702
    - folder_name: acme
      repo_url: https://github.com/sigmavirus24/golang-x-crypto
      repo_ref: proposal/73101
      repo_hash: c622daa7bb7676bd5480b7f49679e5e4c2adb4fb
      repo_path: acme
