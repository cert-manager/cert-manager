suite: Controller ServiceAccount - Configuration
templates:
  - templates/serviceaccount.yaml
release:
  name: cert-manager
  namespace: cert-manager
tests:
  - it: should not create ServiceAccount when disabled
    set:
      serviceAccount:
        create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should configure name, automount, annotations and labels
    set:
      serviceAccount:
        create: true
        name: custom-sa
        automountServiceAccountToken: false
        annotations:
          eks.amazonaws.com/role-arn: arn:aws:iam::role/cert-manager
        labels:
          custom-label: custom-value
    asserts:
      - isSubset:
          path: metadata
          content:
            name: custom-sa
      - equal:
          path: automountServiceAccountToken
          value: false
      - isSubset:
          path: metadata.annotations
          content:
            eks.amazonaws.com/role-arn: arn:aws:iam::role/cert-manager
      - isSubset:
          path: metadata.labels
          content:
            custom-label: custom-value

  - it: should set imagePullSecrets from global values
    set:
      global:
        imagePullSecrets:
          - name: my-pull-secret
    asserts:
      - contains:
          path: imagePullSecrets
          content:
            name: my-pull-secret
