suite: Controller ServiceAccount - Configuration
templates:
  - templates/serviceaccount.yaml
release:
  name: cert-manager
  namespace: cert-manager
tests:
  - it: should not create ServiceAccount when disabled
    set:
      serviceAccount:
        create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should configure name
    set:
      serviceAccount:
        create: true
        name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  - it: should configure automountServiceAccountToken
    set:
      serviceAccount:
        create: true
        automountServiceAccountToken: false
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: should configure annotations
    set:
      serviceAccount:
        create: true
        annotations:
          eks.amazonaws.com/role-arn: arn:aws:iam::role/cert-manager
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            eks.amazonaws.com/role-arn: arn:aws:iam::role/cert-manager

  - it: should configure labels
    set:
      serviceAccount:
        create: true
        labels:
          custom-label: custom-value
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            custom-label: custom-value

  - it: should set imagePullSecrets from global values
    set:
      global:
        imagePullSecrets:
          - name: my-pull-secret
    asserts:
      - contains:
          path: imagePullSecrets
          content:
            name: my-pull-secret
