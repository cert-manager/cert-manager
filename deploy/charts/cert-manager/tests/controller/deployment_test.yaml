suite: Controller Deployment - Configuration
templates:
  - templates/deployment.yaml
release:
  name: cert-manager
  namespace: cert-manager
tests:
  - it: should set replicaCount
    set:
      replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should set deployment annotations
    set:
      deploymentAnnotations:
        custom-annotation: custom-value
      podAnnotations:
        custom-annotation: custom-value
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            custom-annotation: custom-value
      - isSubset:
          path: spec.template.metadata.annotations
          content:
            custom-annotation: custom-value

  - it: should set deployment strategy
    set:
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 0
          maxUnavailable: 1
    asserts:
      - isSubset:
          path: spec.strategy
          content:
            type: RollingUpdate
            rollingUpdate:
              maxSurge: 0
              maxUnavailable: 1

  - it: should set revisionHistoryLimit when specified
    set:
      global:
        revisionHistoryLimit: 5
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 5

  - it: should set revisionHistoryLimit to 0
    set:
      global:
        revisionHistoryLimit: 0
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 0

  - it: should set pod labels
    set:
      podLabels:
        custom-label: custom-value
    asserts:
      - isSubset:
          path: spec.template.metadata.labels
          content:
            custom-label: custom-value

  - it: should not add prometheus annotations when prometheus is disabled
    set:
      prometheus:
        enabled: false
    asserts:
      - notExists:
          path: spec.template.metadata.annotations

  - it: should not add prometheus annotations when servicemonitor is enabled
    set:
      prometheus:
        enabled: true
        servicemonitor:
          enabled: true
    asserts:
      - notExists:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]

  - it: should configure image registry, repository, tag and pullPolicy
    set:
      image:
        repository: custom-registry.io/cert-manager-controller
        tag: custom-tag
        pullPolicy: Always
    asserts:
      - isSubset:
          path: spec.template.spec.containers[0]
          content:
            image: "custom-registry.io/cert-manager-controller:custom-tag"
            imagePullPolicy: Always

  - it: should use custom imageRegistry and imageNamespace
    set:
      imageRegistry: my-registry.io
      imageNamespace: my-namespace
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ^my-registry\.io/my-namespace/cert-manager-controller

  - it: should set custom leader election settings
    set:
      global:
        leaderElection:
          namespace: custom-ns
          leaseDuration: 120s
          renewDeadline: 80s
          retryPeriod: 30s
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--leader-election-namespace=custom-ns"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--leader-election-lease-duration=120s"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--leader-election-renew-deadline=80s"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--leader-election-retry-period=30s"

  - it: should set clusterResourceNamespace arg
    set:
      clusterResourceNamespace: custom-namespace
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--cluster-resource-namespace=custom-namespace"

  - it: should set featureGates arg
    set:
      featureGates: "ExperimentalFeature=true"
      maxConcurrentChallenges: 120
      enableCertificateOwnerRef: true
      disableAutoApproval: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--feature-gates=ExperimentalFeature=true"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--max-concurrent-challenges=120"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--enable-certificate-owner-ref=true"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--controllers=-certificaterequests-approver"

  - it: should append extraArgs
    set:
      extraArgs:
        - --extra-flag=value
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--extra-flag=value"

  - it: should set DNS01 recursive nameservers
    set:
      dns01RecursiveNameservers: "8.8.8.8:53,1.1.1.1:53"
      dns01RecursiveNameserversOnly: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--dns01-recursive-nameservers=8.8.8.8:53,1.1.1.1:53"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--dns01-recursive-nameservers-only=true"

  - it: should set ingress shim defaults
    set:
      ingressShim:
        defaultIssuerName: letsencrypt-prod
        defaultIssuerKind: ClusterIssuer
        defaultIssuerGroup: cert-manager.io
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--default-issuer-name=letsencrypt-prod"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--default-issuer-kind=ClusterIssuer"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--default-issuer-group=cert-manager.io"

  - it: should set container resources
    set:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
    asserts:
      - isSubset:
          path: spec.template.spec.containers[0].resources
          content:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

  - it: should set container security context
    set:
      containerSecurityContext:
        runAsNonRoot: true
        readOnlyRootFilesystem: true
    asserts:
      - isSubset:
          path: spec.template.spec.containers[0].securityContext
          content:
            runAsNonRoot: true
            readOnlyRootFilesystem: true

  - it: should set pod security context
    set:
      securityContext:
        runAsNonRoot: true
        fsGroup: 1001
    asserts:
      - isSubset:
          path: spec.template.spec.securityContext
          content:
            runAsNonRoot: true
            fsGroup: 1001

  - it: should set proxy env vars
    set:
      http_proxy: http://proxy:8080
      https_proxy: https://proxy:8443
      no_proxy: localhost,127.0.0.1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HTTP_PROXY
            value: http://proxy:8080
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HTTPS_PROXY
            value: https://proxy:8443
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NO_PROXY
            value: localhost,127.0.0.1

  - it: should merge global and component node selectors
    set:
      global:
        nodeSelector:
          global-key: global-value
      nodeSelector:
        component-key: component-value
    asserts:
      - isSubset:
          path: spec.template.spec.nodeSelector
          content:
            global-key: global-value
            component-key: component-value

  - it: should set tolerations
    set:
      tolerations:
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
    asserts:
      - contains:
          path: spec.template.spec.tolerations
          content:
            key: node-role.kubernetes.io/master
            operator: Exists
            effect: NoSchedule

  - it: should set affinity
    set:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/os
                    operator: In
                    values:
                      - linux
    asserts:
      - exists:
          path: spec.template.spec.affinity.nodeAffinity

  - it: should set topology spread constraints
    set:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
    asserts:
      - contains:
          path: spec.template.spec.topologySpreadConstraints
          content:
            maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway

  - it: should set priorityClassName
    set:
      global:
        priorityClassName: high-priority
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: high-priority

  - it: should set automountServiceAccountToken when specified
    set:
      automountServiceAccountToken: false
    asserts:
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false

  - it: should mount config volume when config is set
    set:
      config:
        apiVersion: controller.config.cert-manager.io/v1alpha1
        kind: ControllerConfiguration
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--config=/var/cert-manager/config/config.yaml"
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            configMap:
              name: cert-manager
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config
            mountPath: /var/cert-manager/config

  - it: should set DNS policy and DNS config
    set:
      podDnsPolicy: ClusterFirstWithHostNet
      podDnsConfig:
        nameservers:
          - 8.8.8.8
    asserts:
      - equal:
          path: spec.template.spec.dnsPolicy
          value: ClusterFirstWithHostNet
      - isSubset:
          path: spec.template.spec.dnsConfig
          content:
            nameservers:
              - 8.8.8.8

  - it: should set extra containers
    set:
      extraContainers:
        - name: sidecar
          image: busybox
    asserts:
      - contains:
          path: spec.template.spec.containers
          content:
            name: sidecar
            image: busybox

  - it: should override namespace and name
    set:
      namespace: custom-namespace
      fullnameOverride: my-cert-manager
    asserts:
      - isSubset:
          path: metadata
          content:
            name: my-cert-manager
            namespace: custom-namespace

  - it: should apply common labels
    set:
      global:
        commonLabels:
          team: platform
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            team: platform
      - isSubset:
          path: spec.template.metadata.labels
          content:
            team: platform

  - it: should set hostUsers when specified
    set:
      global:
        hostUsers: false
    asserts:
      - equal:
          path: spec.template.spec.hostUsers
          value: false

  - it: should set runtimeClassName when specified
    set:
      runtimeClassName: something
    asserts:
    - equal:
        path: spec.template.spec.runtimeClassName
        value: something
  - it: should favor controller over global for runtimeClassName
    set:
      runtimeClassName: something
      global.runtimeClassName: ignored
    asserts:
    - equal:
        path: spec.template.spec.runtimeClassName
        value: something
  - it: should fall back to global for runtimeClassName
    set:
      global.runtimeClassName: something
    asserts:
    - equal:
        path: spec.template.spec.runtimeClassName
        value: something
  - it: should set acme-http01-solver-runtime-class-name when acmesolver.runtimeClassName is set
    set:
      acmesolver.runtimeClassName: something
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --acme-http01-solver-runtime-class-name="something"
