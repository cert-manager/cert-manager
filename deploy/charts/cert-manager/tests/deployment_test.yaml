suite: Controller Deployment
templates:
  - templates/deployment.yaml
release:
  name: cert-manager
  namespace: cert-manager
tests:
  - it: should render a Deployment with default values
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: cert-manager
      - equal:
          path: metadata.namespace
          value: cert-manager
      - equal:
          path: spec.replicas
          value: 1
      - equal:
          path: spec.template.spec.serviceAccountName
          value: cert-manager

  - it: should set the correct labels
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: cert-manager
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: cert-manager
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: controller

  - it: should set replicas from values
    set:
      replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should set deployment annotations when specified
    set:
      deploymentAnnotations:
        custom-annotation: custom-value
    asserts:
      - equal:
          path: metadata.annotations["custom-annotation"]
          value: custom-value

  - it: should not set revisionHistoryLimit by default
    asserts:
      - isNull:
          path: spec.revisionHistoryLimit

  - it: should set revisionHistoryLimit when specified
    set:
      global:
        revisionHistoryLimit: 5
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 5

  - it: should set revisionHistoryLimit to 0
    set:
      global:
        revisionHistoryLimit: 0
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 0

  - it: should set deployment strategy when specified
    set:
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 0
          maxUnavailable: 1
    asserts:
      - isSubset:
          path: spec.strategy
          content:
            type: RollingUpdate
            rollingUpdate:
              maxSurge: 0
              maxUnavailable: 1

  - it: should set correct matchLabels on selector
    asserts:
      - isSubset:
          path: spec.selector.matchLabels
          content:
            app.kubernetes.io/name: cert-manager
            app.kubernetes.io/component: controller

  - it: should set pod labels from values
    set:
      podLabels:
        custom-label: custom-value
    asserts:
      - equal:
          path: spec.template.metadata.labels["custom-label"]
          value: custom-value

  - it: should set pod annotations from values
    set:
      podAnnotations:
        custom-annotation: custom-value
    asserts:
      - equal:
          path: spec.template.metadata.annotations["custom-annotation"]
          value: custom-value

  - it: should add prometheus scrape annotations by default
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/port"]
          value: "9402"
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/path"]
          value: /metrics

  - it: should not add prometheus annotations when prometheus is disabled
    set:
      prometheus:
        enabled: false
    asserts:
      - isNull:
          path: spec.template.metadata.annotations

  - it: should not add prometheus annotations when servicemonitor is enabled
    set:
      prometheus:
        enabled: true
        servicemonitor:
          enabled: true
    asserts:
      - isNull:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]

  - it: should use the default image
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ^quay\.io/jetstack/cert-manager-controller

  - it: should set image pull policy
    set:
      image:
        pullPolicy: Always
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always

  - it: should use custom image repository
    set:
      image:
        repository: custom-registry.io/cert-manager-controller
        tag: custom-tag
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "custom-registry.io/cert-manager-controller:custom-tag"

  - it: should use custom imageRegistry and imageNamespace
    set:
      imageRegistry: my-registry.io
      imageNamespace: my-namespace
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ^my-registry\.io/my-namespace/cert-manager-controller

  - it: should set log level from global values
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--v=2"

  - it: should set leader election namespace
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--leader-election-namespace=kube-system"

  - it: should set custom leader election settings
    set:
      global:
        leaderElection:
          namespace: custom-ns
          leaseDuration: 120s
          renewDeadline: 80s
          retryPeriod: 30s
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--leader-election-namespace=custom-ns"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--leader-election-lease-duration=120s"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--leader-election-renew-deadline=80s"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--leader-election-retry-period=30s"

  - it: should set cluster resource namespace when specified
    set:
      clusterResourceNamespace: custom-namespace
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--cluster-resource-namespace=custom-namespace"

  - it: should use POD_NAMESPACE for cluster resource namespace by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--cluster-resource-namespace=$(POD_NAMESPACE)"

  - it: should set feature gates when specified
    set:
      featureGates: "ExperimentalFeature=true"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--feature-gates=ExperimentalFeature=true"

  - it: should set max concurrent challenges when specified
    set:
      maxConcurrentChallenges: 120
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--max-concurrent-challenges=120"

  - it: should enable certificate owner ref when specified
    set:
      enableCertificateOwnerRef: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--enable-certificate-owner-ref=true"

  - it: should disable auto approval when specified
    set:
      disableAutoApproval: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--controllers=-certificaterequests-approver"

  - it: should set DNS01 recursive nameservers
    set:
      dns01RecursiveNameservers: "8.8.8.8:53,1.1.1.1:53"
      dns01RecursiveNameserversOnly: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--dns01-recursive-nameservers=8.8.8.8:53,1.1.1.1:53"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--dns01-recursive-nameservers-only=true"

  - it: should set ingress shim defaults
    set:
      ingressShim:
        defaultIssuerName: letsencrypt-prod
        defaultIssuerKind: ClusterIssuer
        defaultIssuerGroup: cert-manager.io
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--default-issuer-name=letsencrypt-prod"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--default-issuer-kind=ClusterIssuer"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--default-issuer-group=cert-manager.io"

  - it: should set extra args
    set:
      extraArgs:
        - --extra-flag=value
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--extra-flag=value"

  - it: should set container ports
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            containerPort: 9402
            name: http-metrics
            protocol: TCP
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            containerPort: 9403
            name: http-healthz
            protocol: TCP

  - it: should set resources when specified
    set:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 100m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 256Mi

  - it: should set container security context
    set:
      containerSecurityContext:
        runAsNonRoot: true
        readOnlyRootFilesystem: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true

  - it: should set pod security context
    set:
      securityContext:
        runAsNonRoot: true
        fsGroup: 1001
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 1001

  - it: should set POD_NAMESPACE env var
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace

  - it: should set extra env vars
    set:
      extraEnv:
        - name: CUSTOM_ENV
          value: custom-value
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CUSTOM_ENV
            value: custom-value

  - it: should set proxy env vars
    set:
      http_proxy: http://proxy:8080
      https_proxy: https://proxy:8443
      no_proxy: localhost,127.0.0.1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HTTP_PROXY
            value: http://proxy:8080
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HTTPS_PROXY
            value: https://proxy:8443
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NO_PROXY
            value: localhost,127.0.0.1

  - it: should set node selector
    set:
      nodeSelector:
        kubernetes.io/os: linux
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector["kubernetes.io/os"]
          value: "linux"

  - it: should merge global and component node selectors
    set:
      global:
        nodeSelector:
          global-key: global-value
      nodeSelector:
        component-key: component-value
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector["global-key"]
          value: "global-value"
      - equal:
          path: spec.template.spec.nodeSelector["component-key"]
          value: "component-value"

  - it: should set tolerations
    set:
      tolerations:
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
    asserts:
      - contains:
          path: spec.template.spec.tolerations
          content:
            key: node-role.kubernetes.io/master
            operator: Exists
            effect: NoSchedule

  - it: should set affinity
    set:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/os
                    operator: In
                    values:
                      - linux
    asserts:
      - isNotNull:
          path: spec.template.spec.affinity.nodeAffinity

  - it: should set topology spread constraints
    set:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
    asserts:
      - contains:
          path: spec.template.spec.topologySpreadConstraints
          content:
            maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway

  - it: should set priority class name
    set:
      global:
        priorityClassName: high-priority
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: "high-priority"

  - it: should set enableServiceLinks
    asserts:
      - equal:
          path: spec.template.spec.enableServiceLinks
          value: false

  - it: should enable liveness probe when configured
    set:
      livenessProbe:
        enabled: true
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 15
        successThreshold: 1
        failureThreshold: 8
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: http-healthz
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /livez
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.initialDelaySeconds
          value: 10

  - it: should set automountServiceAccountToken when specified
    set:
      automountServiceAccountToken: false
    asserts:
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false

  - it: should mount config volume when config is set
    set:
      config:
        apiVersion: controller.config.cert-manager.io/v1alpha1
        kind: ControllerConfiguration
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--config=/var/cert-manager/config/config.yaml"
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            configMap:
              name: cert-manager
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config
            mountPath: /var/cert-manager/config

  - it: should set DNS policy when specified
    set:
      podDnsPolicy: ClusterFirstWithHostNet
    asserts:
      - equal:
          path: spec.template.spec.dnsPolicy
          value: ClusterFirstWithHostNet

  - it: should set DNS config when specified
    set:
      podDnsConfig:
        nameservers:
          - 8.8.8.8
    asserts:
      - equal:
          path: spec.template.spec.dnsConfig.nameservers[0]
          value: "8.8.8.8"

  - it: should set extra containers
    set:
      extraContainers:
        - name: sidecar
          image: busybox
    asserts:
      - contains:
          path: spec.template.spec.containers
          content:
            name: sidecar
            image: busybox

  - it: should use namespace override
    set:
      namespace: custom-namespace
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-namespace

  - it: should use fullnameOverride
    set:
      fullnameOverride: my-cert-manager
    asserts:
      - equal:
          path: metadata.name
          value: my-cert-manager

  - it: should set global common labels
    set:
      global:
        commonLabels:
          team: platform
    asserts:
      - equal:
          path: metadata.labels["team"]
          value: platform
      - equal:
          path: spec.template.metadata.labels["team"]
          value: platform

  - it: should set hostUsers when specified
    set:
      global:
        hostUsers: false
    asserts:
      - equal:
          path: spec.template.spec.hostUsers
          value: false
