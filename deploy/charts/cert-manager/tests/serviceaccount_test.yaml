suite: Controller ServiceAccount
templates:
  - templates/serviceaccount.yaml
release:
  name: cert-manager
  namespace: cert-manager
tests:
  - it: should create a ServiceAccount by default
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: cert-manager
      - equal:
          path: metadata.namespace
          value: cert-manager

  - it: should not create ServiceAccount when disabled
    set:
      serviceAccount:
        create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should use custom service account name
    set:
      serviceAccount:
        create: true
        name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  - it: should set automountServiceAccountToken
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: true

  - it: should disable automountServiceAccountToken
    set:
      serviceAccount:
        automountServiceAccountToken: false
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: should set annotations
    set:
      serviceAccount:
        annotations:
          eks.amazonaws.com/role-arn: arn:aws:iam::role/cert-manager
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            eks.amazonaws.com/role-arn: arn:aws:iam::role/cert-manager

  - it: should set custom labels
    set:
      serviceAccount:
        labels:
          custom-label: custom-value
    asserts:
      - equal:
          path: metadata.labels["custom-label"]
          value: custom-value

  - it: should set correct component label
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: controller

  - it: should set imagePullSecrets from global values
    set:
      global:
        imagePullSecrets:
          - name: my-pull-secret
    asserts:
      - contains:
          path: imagePullSecrets
          content:
            name: my-pull-secret
